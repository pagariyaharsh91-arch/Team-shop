<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Your Orders - Pagariya Super Shop</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    #ordersContainer > div {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 40vh;
      padding: 40px 18px !important;
    }

    #ordersContainer > div > p {
      margin-bottom: 30px;
    }

    #ordersContainer > div > a {
      margin-top: 20px !important;
    }
  </style>
</head>
<body>

  <main style="max-width:900px;margin:30px auto;padding:16px;">
    <h1 style="text-align:center;">Your Orders</h1>
    <p id="ordersSub" style="text-align:center;color:#666;">Loading...</p>

    <div id="ordersContainer"></div>

    <div style="text-align:center;margin-top:20px;">
      <button onclick="logoutUser()" style="background:#52C41A;color:#fff;border:none;padding:10px 16px;border-radius:10px;font-weight:800;">
        Logout
      </button>
    </div>
  </main>

  <script>
    const API_BASE = "http://localhost:5000";

    function logoutUser() {
      localStorage.removeItem("token");
      localStorage.removeItem("user");
      location.href = "index.html";
    }

    async function loadOrders() {
      const token = localStorage.getItem("token");
      const sub = document.getElementById("ordersSub");
      const box = document.getElementById("ordersContainer");

      if (!token) {
        sub.textContent = "Please login to view orders.";
        box.innerHTML = `<div style="background:#fff;border:1px dashed #ccc;border-radius:14px;padding:18px;text-align:center;">
          <p>You are not logged in.</p>
          <a href="login.html" style="display:inline-block;margin-top:10px;background:#52C41A;color:#fff;padding:10px 16px;border-radius:10px;text-decoration:none;font-weight:800;">Login</a>
        </div>`;
        return;
      }

      try {
        const res = await fetch(`${API_BASE}/api/orders/my`, {
          headers: { Authorization: "Bearer " + token }
        });

        const orders = await res.json();

        if (!res.ok) {
          sub.textContent = orders.message || "Could not load orders.";
          return;
        }

        if (!Array.isArray(orders) || orders.length === 0) {
          sub.textContent = "No orders yet.";
          box.innerHTML = `<div style="background:#fff;border:1px dashed #ccc;border-radius:14px;padding:18px;text-align:center;">
            <p>Your order history is empty.</p>
            <a href="index.html" style="display:inline-block;margin-top:10px;background:#52C41A;color:#fff;padding:10px 16px;border-radius:10px;text-decoration:none;font-weight:800;">Start Shopping</a>
          </div>`;
          return;
        }

        sub.textContent = "Showing your recent orders ✅";

        box.innerHTML = orders.map(o => {
          const dt = new Date(o.createdAt).toLocaleString();
          const items = (o.items || []).map(i => `<li><b>${i.name}</b> × ${i.quantity} — ₹${i.price}</li>`).join("");
          return `
            <div style="background:#fff;border:1px solid #eee;border-radius:14px;padding:16px;margin:12px 0;box-shadow:0 8px 20px rgba(0,0,0,0.06);">
              <div style="display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;">
                <div>
                  <div style="font-weight:900;">Total: ₹${(o.total ?? 0).toFixed(2)}</div>
                  <div style="color:#666;font-size:13px;margin-top:4px;">${dt}</div>
                </div>
                <div style="background:rgba(82,196,26,0.12);color:#2b7a0b;border:1px solid rgba(82,196,26,0.25);padding:6px 10px;border-radius:999px;font-weight:800;font-size:12px;">
                  Order Placed
                </div>
              </div>

              <ul style="margin-top:12px;padding-left:18px;">${items}</ul>

              <div style="margin-top:12px;display:flex;gap:10px;flex-wrap:wrap;">
                <span style="background:#f6f6f6;border:1px solid #eee;padding:6px 10px;border-radius:10px;">Subtotal: ₹${(o.subtotal ?? 0).toFixed(2)}</span>
                <span style="background:#f6f6f6;border:1px solid #eee;padding:6px 10px;border-radius:10px;">Delivery: ₹${(o.deliveryCharge ?? 0).toFixed(2)}</span>
                <span style="background:#f6f6f6;border:1px solid #eee;padding:6px 10px;border-radius:10px;">Discount: ₹${(o.discount ?? 0).toFixed(2)}</span>
              </div>
            </div>
          `;
        }).join("");

      } catch {
        sub.textContent = "Server not reachable / Network error";
      }
    }

    document.addEventListener("DOMContentLoaded", loadOrders);
  </script>

  <script src="./auth-navbar.js"></script>

</body>
</html>
