<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login & Register - Pagariya Super Shop</title>

  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="login.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>

<body>
  <!-- HEADER -->
  <header class="auth-header">
    <div class="auth-container">
      <div class="auth-logo">
        <i class="fas fa-bag-shopping"></i>
        <h1>Pagariya Super Shop</h1>
      </div>
      <a href="index.html" class="back-home-btn">
        <i class="fas fa-arrow-left"></i>
        <span>Back to Home</span>
      </a>
    </div>
  </header>

  <!-- MAIN CONTENT -->
  <main class="auth-main">
    <div class="auth-card">
      <!-- TABS -->
      <div class="auth-tabs">
        <button type="button" class="tab-btn active" data-tab="login">
          <i class="fas fa-sign-in-alt"></i>
          Login
        </button>
        <button type="button" class="tab-btn" data-tab="register">
          <i class="fas fa-user-plus"></i>
          Register
        </button>
      </div>

      <!-- LOGIN FORM -->
      <div class="tab-content active" id="login-tab">
        <form id="loginForm" class="auth-form" autocomplete="on">
          <h2>Welcome Back!</h2>
          <p class="form-subtitle">Login to your Pagariya account</p>

          <!-- Phone/Email Input -->
          <div class="form-group">
            <label for="loginPhone">Phone / Email</label>
            <div class="input-wrapper">
              <i class="fas fa-phone"></i>
              <input
                type="text"
                id="loginPhone"
                name="identifier"
                placeholder="Enter phone (10 digits) or email"
                autocomplete="username"
                required
              />
            </div>
            <span class="error-message" id="loginPhoneError"></span>
          </div>

          <!-- Password Input -->
          <div class="form-group">
            <label for="loginPassword">Password</label>
            <div class="input-wrapper">
              <i class="fas fa-lock"></i>
              <input
                type="password"
                id="loginPassword"
                name="password"
                placeholder="Enter your password"
                autocomplete="current-password"
                required
              />
              <button type="button" class="toggle-password" data-target="loginPassword" aria-label="Show/Hide password">
                <i class="fas fa-eye"></i>
              </button>
            </div>
            <span class="error-message" id="loginPasswordError"></span>
          </div>

          <!-- Remember Me & Forgot Password -->
          <div class="form-footer">
            <label class="checkbox-label">
              <input type="checkbox" name="rememberMe" />
              <span>Remember me</span>
            </label>
            <a href="#" class="forgot-password-link">Forgot password?</a>
          </div>

          <!-- Submit Button -->
          <button type="submit" class="submit-btn">
            <i class="fas fa-arrow-right"></i>
            Login
          </button>
        </form>
      </div>

      <!-- REGISTER FORM -->
      <div class="tab-content" id="register-tab">
        <form id="registerForm" class="auth-form" autocomplete="on">
          <h2>Create Account</h2>
          <p class="form-subtitle">Join Pagariya Super Shop today</p>

          <!-- Name Input -->
          <div class="form-group">
            <label for="registerName">Full Name</label>
            <div class="input-wrapper">
              <i class="fas fa-user"></i>
              <input
                type="text"
                id="registerName"
                name="name"
                placeholder="Enter your full name"
                autocomplete="name"
                required
              />
            </div>
            <span class="error-message" id="registerNameError"></span>
          </div>

          <!-- Phone Input -->
          <div class="form-group">
            <label for="registerPhone">Phone Number</label>
            <div class="input-wrapper">
              <i class="fas fa-phone"></i>
              <input
                type="tel"
                id="registerPhone"
                name="phone"
                placeholder="10-digit phone number"
                inputmode="numeric"
                autocomplete="tel"
                required
              />
            </div>
            <span class="error-message" id="registerPhoneError"></span>
          </div>

          <!-- Email Input -->
          <div class="form-group">
            <label for="registerEmail">Email (Optional)</label>
            <div class="input-wrapper">
              <i class="fas fa-envelope"></i>
              <input
                type="email"
                id="registerEmail"
                name="email"
                placeholder="Enter email (optional)"
                autocomplete="email"
              />
            </div>
            <span class="error-message" id="registerEmailError"></span>
          </div>

          <!-- Password Input -->
          <div class="form-group">
            <label for="registerPassword">Password</label>
            <div class="input-wrapper">
              <i class="fas fa-lock"></i>
              <input
                type="password"
                id="registerPassword"
                name="password"
                placeholder="Min 6 characters"
                autocomplete="new-password"
                required
              />
              <button type="button" class="toggle-password" data-target="registerPassword" aria-label="Show/Hide password">
                <i class="fas fa-eye"></i>
              </button>
            </div>
            <span class="error-message" id="registerPasswordError"></span>
          </div>

          <!-- Confirm Password Input -->
          <div class="form-group">
            <label for="registerConfirm">Confirm Password</label>
            <div class="input-wrapper">
              <i class="fas fa-lock"></i>
              <input
                type="password"
                id="registerConfirm"
                name="confirmPassword"
                placeholder="Re-enter password"
                autocomplete="new-password"
                required
              />
              <button type="button" class="toggle-password" data-target="registerConfirm" aria-label="Show/Hide password">
                <i class="fas fa-eye"></i>
              </button>
            </div>
            <span class="error-message" id="registerConfirmError"></span>
          </div>

          <!-- Submit Button -->
          <button type="submit" class="submit-btn">
            <i class="fas fa-user-plus"></i>
            Create Account
          </button>
        </form>
      </div>
    </div>
  </main>

  <!-- TOAST NOTIFICATION -->
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="login.js"></script>
</body>
</html>
